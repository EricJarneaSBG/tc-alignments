<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandXML Alignment Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <header>
            <h1>LandXML Alignment</h1>
        </header>
        <main>
            <div class="controls">
                <div id="file-picker-container">
                    <div class="search-wrapper">
                        <input type="text" id="file-search" placeholder="Search files...">
                        <select id="project-files">
                            <option value="">-- Select LandXML --</option>
                        </select>
                    </div>
                    <button id="reload-files-btn" class="button small">🔄</button>
                </div>
                <button id="clear-btn" class="button secondary">Clear Viewer</button>
            </div>
            <div id="status-container">
                <p id="status">Waiting for LandXML selection...</p>
                <div id="alignment-list" class="hidden">
                    <div class="list-header">
                        <h3>Alignments:</h3>
                        <div class="list-actions">
                            <button id="select-all" class="link-btn">All</button> | 
                            <button id="select-none" class="link-btn">None</button>
                        </div>
                    </div>
                    <div id="list-items"></div>
                    <button id="draw-btn" class="button">Draw Selected</button>
                </div>
            </div>
            <div class="settings">
                <label>
                    <input type="checkbox" id="draw-alignments" checked> Show Alignment Lines
                </label>
                <label>
                    <input type="checkbox" id="draw-stationing" checked> Show Stationing Ticks
                </label>
                <label>
                    <input type="checkbox" id="draw-text" checked> Show KM Labels
                </label>
                <label>
                    <input type="checkbox" id="zoom-to-selection" checked> Zoom to Selection
                </label>
                <hr>
                <label>
                    Stationing Interval:
                    <input type="number" id="station-interval" value="100" min="10" step="10"> m
                </label>
            </div>
        </main>
        <footer>
            <p>Trimble Connect Extension</p>
        </footer>
    </div>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="app.js"></script>
</body>
</html>
